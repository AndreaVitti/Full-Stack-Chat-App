services:
  postgres:
    container_name: postgresdb
    image: postgres:latest
    environment:
      POSTGRES_DB: chatdb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      PGDATA: /data/postgres
    ports:
      - 5434:5432
    networks:
      - chatServiceNetwork
    volumes:
      - postgres:/data/postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U me"]
      interval: 5s
      retries: 5
      start_period: 5s

  back_end_service:
    build: ./BackEnd
    container_name: backEndService
    environment:
      POSTGRES_DB: chatdb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      DB_HOST: postgres
      DB_PORT: 5432
      SECRET: ${SECRET}
      EXPIRE: ${EXPIRE}
    ports:
      - 8082:8080
    depends_on: 
      postgres:
       condition: service_healthy
    networks:
      - chatServiceNetwork

  front_end_service:
    build: ./FrontEnd
    container_name: frontEndService
    ports:
      - 4202:80
    networks:
      - chatServiceNetwork

networks:
  chatServiceNetwork:
    name: chatServiceNetwork
    driver: bridge

volumes:
  postgres:
